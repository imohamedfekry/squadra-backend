use_default_settings: true

server:
  secret_key: "your-super-secret-key-change-this"
  limiter: false
  image_proxy: true

search:
  safe_search: 0
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    disabled: false
  - name: bing
    engine: bing
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false